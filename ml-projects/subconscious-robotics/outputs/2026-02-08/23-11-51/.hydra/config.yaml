domain_randomization:
  enabled: true
  mass:
    enabled: true
    range:
    - 0.85
    - 1.15
  friction:
    enabled: true
    lateral_range:
    - 0.5
    - 1.5
    spinning_range:
    - 0.3
    - 0.8
    rolling_range:
    - 0.001
    - 0.01
  gravity:
    enabled: true
    range:
    - -10.5
    - -9.0
  joint_damping:
    enabled: true
    range:
    - 0.8
    - 1.2
  observation_noise:
    enabled: true
    position_std: 0.001
    velocity_std: 0.01
physics:
  solver_iterations: 50
  contact_breaking_threshold: 0.02
  enable_cone_friction: true
reward:
  weights:
    task_completion: 10.0
    distance_to_goal: 1.0
    energy_penalty: -0.01
    stability: 0.5
    smoothness: 0.1
    collision_penalty: -5.0
    time_penalty: -0.001
  shaping:
    normalize: true
    clip_min: -10.0
    clip_max: 10.0
    scale: 1.0
  sparse_reward: false
  goal:
    success_threshold: 0.05
    success_bonus: 100.0
curriculum:
  enabled: false
  stages:
  - difficulty: 0.3
    timesteps: 100000
  - difficulty: 0.6
    timesteps: 200000
  - difficulty: 1.0
    timesteps: null
agent:
  policy_type: mlp
  mlp:
    net_arch:
      pi:
      - 256
      - 256
      - 128
      vf:
      - 256
      - 256
      - 128
    activation: tanh
  cnn:
    features_dim: 256
    net_arch:
    - 256
    - 128
ppo:
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  clip_range_vf: null
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  use_sde: false
  sde_sample_freq: -1
sac:
  learning_rate: 0.0003
  buffer_size: 1000000
  learning_starts: 10000
  batch_size: 256
  tau: 0.005
  gamma: 0.99
  train_freq: 1
  gradient_steps: 1
  ent_coef: auto
  target_update_interval: 1
  target_entropy: auto
  use_sde: false
  sde_sample_freq: -1
project_name: subconscious_robotics
seed: 42
env:
  urdf_path: assets/quadruped.urdf
  time_step: 0.00416667
  max_episode_steps: 1000
  enable_rendering: false
training:
  algorithm: ppo
  total_timesteps: 1000000
  n_envs: 4
  save_freq: 50000
  log_dir: outputs/logs
  checkpoint_dir: outputs/checkpoints
eval:
  n_episodes: 10
  render: true
  deterministic: true
